<!doctype html>
<html>
  <head>
    <title>Task Manager</title>
  </head>

  <body>
    <h1>Task Manager</h1>

    <button id="loadBtn">Load Tasks</button>
    <ul id="taskList"></ul>

    <input type="text" id="taskInput" placeholder="New task" />
    <button id="addBtn">Add Task</button>

    <hr />

    <!-- NEW BUTTONS -->
    <button id="xhrBtn">Load with XHR</button>
    <button id="promiseBtn">Load with Promise</button>
    <button id="asyncBtn">Load with Async/Await</button>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
      $(document).ready(function () {
        // ========================
        // LOAD TASKS (GET)
        // ========================
        $("#loadBtn").click(function () {
          $.ajax({
            url: "http://localhost:3000/tasks",
            method: "GET",
            success: function (data) {
              $("#taskList").empty();

              data.forEach((task) => {
                $("#taskList").append(`
                  <li data-id="${task.id}">
                    <span class="taskTitle">${task.title}</span>
                    
                    <input 
                      class="updateInput" 
                      type="text" 
                      placeholder="New title" 
                      style="display:none;" 
                    />

                    <button class="deleteBtn">Delete</button>
                    <button class="updateBtn">Update</button>
                  </li>
                `);
              });
            },
          });
        });

        // ========================
        // ADD TASK (POST)
        // ========================
        $("#addBtn").click(function () {
          let task = $("#taskInput").val();

          $.ajax({
            url: "http://localhost:3000/tasks",
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify({ title: task }),
            success: function () {
              alert("Task added");
              $("#taskInput").val("");
            },
          });
        });

        // ========================
        // DELETE TASK (DELETE)
        // ========================
        $(document).on("click", ".deleteBtn", function () {
          let id = $(this).parent().data("id");

          $.ajax({
            url: `http://localhost:3000/tasks/${id}`,
            method: "DELETE",
            success: function () {
              alert("Task deleted");
            },
          });
        });

        // ========================
        // UPDATE TASK (PUT)
        // ========================
        $(document).on("click", ".updateBtn", function () {
          let $li = $(this).parent();
          let $input = $li.find(".updateInput");

          if ($input.is(":hidden")) {
            $input.show().focus();
            $(this).text("Confirm");
          } else {
            let newTitle = $input.val().trim();

            if (!newTitle) {
              alert("Please enter a new title.");
              return;
            }

            let id = $li.data("id");

            $.ajax({
              url: `http://localhost:3000/tasks/${id}`,
              method: "PUT",
              contentType: "application/json",
              data: JSON.stringify({ title: newTitle }),
              success: function () {
                $li.find(".taskTitle").text(newTitle);
                $input.hide().val("");
                $li.find(".updateBtn").text("Update");

                alert("Task updated");
              },
            });
          }
        });

        // ========================
        // LOAD TASKS (XHR)
        // ========================
        $("#xhrBtn").click(function () {
          let xhr = new XMLHttpRequest();

          xhr.open("GET", "http://localhost:3000/tasks");

          xhr.onload = function () {
            if (xhr.status === 200) {
              let data = JSON.parse(xhr.responseText);

              $("#taskList").empty();

              data.forEach((task) => {
                $("#taskList").append(`
                  <li>${task.title} (XHR)</li>
                `);
              });
            }
          };

          xhr.send();
        });

        // ========================
        // LOAD TASKS (PROMISE)
        // ========================
        function getTasksPromise() {
          return new Promise((resolve, reject) => {
            $.ajax({
              url: "http://localhost:3000/tasks",
              method: "GET",
              success: resolve,
              error: reject,
            });
          });
        }

        $("#promiseBtn").click(function () {
          getTasksPromise()
            .then((data) => {
              $("#taskList").empty();

              data.forEach((task) => {
                $("#taskList").append(`
                  <li>${task.title} (Promise)</li>
                `);
              });
            })
            .catch(() => {
              alert("Error loading tasks");
            });
        });

        // ========================
        // LOAD TASKS (ASYNC/AWAIT)
        // ========================
        async function loadTasksAsync() {
          try {
            let response = await fetch("http://localhost:3000/tasks");
            let data = await response.json();

            $("#taskList").empty();

            data.forEach((task) => {
              $("#taskList").append(`
                <li>${task.title} (Async/Await)</li>
              `);
            });
          } catch (error) {
            alert("Error loading tasks");
          }
        }

        $("#asyncBtn").click(function () {
          loadTasksAsync();
        });
      });
    </script>
  </body>
</html>
